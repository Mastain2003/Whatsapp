<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Order Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="app">

    <aside class="sidebar">
        <h3>WhatsApp</h3>
        <h5>Order Manager</h5>

        <ul>
    <li class="active" onclick="showPage('dashboard')">Dashboard</li>
    <li onclick="showPage('customers')">Customers</li>
    <li>Products</li>
    <li>Campaigns</li>
    <li>Orders</li>
    <li>Reports</li>
    <li>Settings</li>
        </ul>
    </aside>


    <main class="content">

        <h2>Dashboard</h2>

        <div class="cards">

            <div class="card-box">
                <h4>Customers</h4>
                <p>0</p>
            </div>

            <div class="card-box">
                <h4>Products</h4>
                <p>0</p>
            </div>

            <div class="card-box">
                <h4>Orders</h4>
                <p>0</p>
            </div>

            <div class="card-box">
                <h4>Messages Sent</h4>
                <p>0</p>
            </div>

        </div>


        <div class="panel">

            <h4>Recent Orders</h4>

            <table class="table">
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Customer</th>
                        <th>Total</th>
                        <th>Status</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td colspan="4">
                            No orders yet
                        </td>
                    </tr>
                </tbody>

            </table>

        </div>


    </main>

</div>


<script src="js/app.js"></script>

</body>
</html>
