<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
WhatsApp Broadcast
</title>


<link rel="stylesheet"
href="../css/sidebar.css">

<link rel="stylesheet"
href="../css/page_broadcast.css">

</head>


<body>


<div id="sidebarContainer"></div>



<div class="page-content">


<h2>
WhatsApp Broadcast
</h2>



<div class="broadcast-box">


<h3>
Customer Filter
</h3>



<div class="filters">


<input
type="text"
id="searchCustomer"
placeholder="Search name or phone">



<select id="cityFilter">

<option value="">
All Cities
</option>

</select>




<select id="departmentFilter">

<option value="">
All Departments
</option>

</select>



</div>




<div class="customer-actions">


<button id="selectAll">

Select All

</button>



<button id="clearAll">

Clear

</button>


</div>




<div id="selectedCount">

Selected: 0

</div>



<div id="customerList">

Loading customers...

</div>



</div>





<div class="broadcast-box">


<h3>
Message
</h3>



<textarea
id="message"
placeholder="Type your WhatsApp message">
</textarea>




<button id="sendBroadcast">

Send Broadcast

</button>



<div id="result">

</div>



</div>



</div>




<script
type="module"
src="../js/page_broadcast.js">
</script>


</body>

</html>
