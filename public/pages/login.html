<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width,initial-scale=1">

    <title>

        Login

    </title>

    <link
        rel="stylesheet"
        href="../css/page_login.css">

</head>

<body>

<div class="login-box">

    <h2>

        WhatsApp CRM

    </h2>

    <input
        id="username"

    <input
        id="password"
        type="password"
        placeholder="Password">

    <button
        id="btnLogin">

        Login

    </button>

    <div id="loginMessage"></div>

</div>

<script
    type="module"
    src="../js/page_login.js">

</script>

</body>

</html>
